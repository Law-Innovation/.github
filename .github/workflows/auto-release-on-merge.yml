name: Auto Release on Merge (Reusable)

on:
  workflow_call:
    inputs:
      tag_prefix:
        description: 'Tag prefix (e.g., analytics-pipeline@, consenter-cb@)'
        required: true
        type: string
      default_bump:
        description: 'Default version bump for manual runs (patch/minor/major)'
        required: false
        type: string
        default: 'patch'
    outputs:
      version:
        description: 'The calculated version (e.g., 1.2.3 or 1.2.3-rc.0)'
        value: ${{ jobs.version-and-tag.outputs.version }}
      tag:
        description: 'The full tag (e.g., analytics-pipeline@1.2.3)'
        value: ${{ jobs.version-and-tag.outputs.tag }}
      semver_type:
        description: 'The semver type used'
        value: ${{ jobs.determine-semver.outputs.semver_type }}
      skip:
        description: 'Whether auto-release was skipped (no release intent)'
        value: ${{ jobs.determine-semver.outputs.skip }}
      environments:
        description: 'JSON array of environments to deploy to'
        value: ${{ jobs.determine-semver.outputs.environments }}
      release_type:
        description: 'stable or release-candidate'
        value: ${{ jobs.determine-semver.outputs.release_type }}

jobs:
  determine-semver:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      semver_type: ${{ steps.determine.outputs.semver_type }}
      skip: ${{ steps.determine.outputs.skip }}
      environments: ${{ steps.determine.outputs.environments }}
      release_type: ${{ steps.determine.outputs.release_type }}
    steps:
      - name: Determine release intent
        id: determine
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DEFAULT_BUMP: ${{ inputs.default_bump }}
        with:
          script: |
            const defaultBump = process.env.DEFAULT_BUMP || 'patch'

            const emit = ({
              skip = false,
              bump = '',
              environments = '["staging","production"]',
              releaseType = ''
            }) => {
              core.setOutput('skip', String(skip))
              core.setOutput('semver_type', bump)
              core.setOutput('environments', environments)
              core.setOutput('release_type', releaseType)
            }

            if (context.eventName === 'workflow_dispatch') {
              core.info(`Manual trigger → ${defaultBump}, both environments`)
              emit({ bump: defaultBump })
              return
            }

            const commit = context.payload.head_commit
            if (!commit) {
              core.info('No head commit on payload — skipping release.')
              emit({ skip: true })
              return
            }

            const { data: prs } =
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: commit.id
              })
            if (prs.length === 0) {
              core.info('No PR associated with this merge commit — skipping release.')
              emit({ skip: true })
              return
            }
            const pr = prs[0]
            core.info(`Found PR #${pr.number}`)

            const names = pr.labels.map((l) => l.name)
            const releaseLabels = names.filter((n) => n.startsWith('release:'))

            if (releaseLabels.length === 0) {
              core.info(
                names.includes('no-release')
                  ? 'no-release label present — skipping release.'
                  : 'No release:* label — skipping release.'
              )
              emit({ skip: true })
              return
            }
            if (releaseLabels.length > 1) {
              core.setFailed(
                `Multiple release labels (${releaseLabels.join(', ')}). Use exactly one.`
              )
              return
            }

            const match = releaseLabels[0].match(
              /^release:(?:(staging):)?(major|minor|patch)$/
            )
            if (!match) {
              core.setFailed(`Unrecognized release label "${releaseLabels[0]}".`)
              return
            }
            const [, env, bump] = match
            const stagingOnly = env === 'staging'
            emit({
              bump,
              environments: stagingOnly
                ? '["staging"]'
                : '["staging","production"]',
              releaseType: stagingOnly ? 'release-candidate' : 'stable'
            })
            core.notice(
              `Release intent: ${bump} → ${
                stagingOnly
                  ? 'staging (release-candidate)'
                  : 'staging + production (stable)'
              }`
            )

  version-and-tag:
    needs: determine-semver
    if: needs.determine-semver.outputs.skip != 'true'
    uses: Law-Innovation/.github/.github/workflows/version-and-tag.yml@main
    with:
      tag_prefix: ${{ inputs.tag_prefix }}
      semver_type: ${{ needs.determine-semver.outputs.semver_type }}
      release_type: ${{ needs.determine-semver.outputs.release_type }}
